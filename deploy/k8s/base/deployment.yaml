apiVersion: apps/v1
kind: Deployment
metadata:
  name: deal-sniper-web
  namespace: foundry-scout
  labels:
    app.kubernetes.io/name: deal-sniper-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: foundry-scout
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deal-sniper-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deal-sniper-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: foundry-scout
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: deal-sniper
          image: ghcr.io/madfam-org/foundry-scout:latest
          command: ["./deal-sniper"]
          args: ["--config", "/config/scout.yaml"]
          ports:
            - name: http
              containerPort: 4205
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: foundry-scout-config
        - name: data
          persistentVolumeClaim:
            claimName: foundry-scout-data
