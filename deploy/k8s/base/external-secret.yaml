apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: foundry-scout-secrets
  namespace: foundry-scout
  labels:
    app.kubernetes.io/name: foundry-scout
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore
  target:
    name: foundry-scout-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: deal-sniper-auth-token
      remoteRef:
        key: secret/foundry-scout
        property: deal_sniper_auth_token
    - secretKey: janua-client-id
      remoteRef:
        key: secret/foundry-scout
        property: janua_client_id
    - secretKey: janua-client-secret
      remoteRef:
        key: secret/foundry-scout
        property: janua_client_secret
    - secretKey: session-secret
      remoteRef:
        key: secret/foundry-scout
        property: session_secret
