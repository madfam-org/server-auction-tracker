<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deal Sniper — Server Auction Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="6"/>
                    <circle cx="12" cy="12" r="2"/>
                    <line x1="12" y1="2" x2="12" y2="4"/>
                    <line x1="12" y1="20" x2="12" y2="22"/>
                    <line x1="2" y1="12" x2="4" y2="12"/>
                    <line x1="20" y1="12" x2="22" y2="12"/>
                </svg>
                <h1>Deal <span>Sniper</span></h1>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <button class="auth-btn" id="auth-btn" onclick="showAuthModal()" title="Authenticate for orders">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </button>
                <div class="header-status">
                    <div class="pulse"></div>
                    <span id="last-update">Loading...</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Refresh countdown bar -->
    <div class="refresh-bar-container">
        <div class="refresh-bar" id="refresh-bar"></div>
    </div>

    <nav>
        <div class="container">
            <button class="active" data-panel="deals">Live Deals</button>
            <button data-panel="history">Price History</button>
            <button data-panel="orders">Order Log</button>
            <button data-panel="config">Config</button>
        </div>
    </nav>

    <main>
        <!-- Live Deals Panel -->
        <div id="panel-deals" class="panel active">
            <div class="container">
                <div class="stats-row" id="deal-stats"></div>

                <!-- Filter bar -->
                <div class="filter-bar" id="filter-bar">
                    <input type="text" id="filter-search" placeholder="Search CPU, datacenter..." class="filter-input">
                    <select id="filter-dc" class="filter-select">
                        <option value="">All Datacenters</option>
                    </select>
                    <div class="filter-range">
                        <input type="number" id="filter-price-min" placeholder="Min €" class="filter-input filter-input-sm" min="0">
                        <span class="filter-sep">—</span>
                        <input type="number" id="filter-price-max" placeholder="Max €" class="filter-input filter-input-sm" min="0">
                    </div>
                    <label class="filter-toggle">
                        <input type="checkbox" id="filter-nvme"> NVMe only
                    </label>
                    <div class="filter-actions">
                        <button class="export-btn" onclick="exportData('csv')" title="Export CSV">CSV</button>
                        <button class="export-btn" onclick="exportData('json')" title="Export JSON">JSON</button>
                    </div>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th class="sortable" data-sort="ServerID">ID</th>
                                <th class="sortable" data-sort="CPU">CPU</th>
                                <th class="sortable" data-sort="RAMSize">RAM</th>
                                <th class="sortable" data-sort="TotalStorageTB">Storage</th>
                                <th class="sortable" data-sort="NVMeCount">NVMe</th>
                                <th class="sortable" data-sort="Datacenter">DC</th>
                                <th class="sortable" data-sort="Price">Price</th>
                                <th class="sortable" data-sort="Score">Score</th>
                                <th class="sortable" data-sort="ScannedAt">Scanned</th>
                            </tr>
                        </thead>
                        <tbody id="deals-table"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Price History Panel -->
        <div id="panel-history" class="panel">
            <div class="container">
                <div class="chart-controls">
                    <select id="cpu-select">
                        <option value="">Select CPU model...</option>
                    </select>
                    <span id="history-info" style="color: var(--text-muted); font-size: 0.85rem;"></span>
                </div>
                <div class="chart-container">
                    <canvas id="price-chart"></canvas>
                </div>
                <div class="stats-row" id="cpu-stats" style="margin-top: 1rem;"></div>
            </div>
        </div>

        <!-- Orders Panel -->
        <div id="panel-orders" class="panel">
            <div class="container">
                <div class="card">
                    <div class="card-title">Order Audit Log</div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Server ID</th>
                                    <th>Score</th>
                                    <th>Price</th>
                                    <th>Status</th>
                                    <th>Message</th>
                                </tr>
                            </thead>
                            <tbody id="orders-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Config Panel -->
        <div id="panel-config" class="panel">
            <div class="container">
                <div class="config-grid" id="config-grid"></div>
            </div>
        </div>
    </main>

    <!-- Simulation Modal -->
    <div class="modal-overlay" id="sim-modal">
        <div class="modal">
            <button class="modal-close" onclick="closeSimModal()">&times;</button>
            <h2 style="font-size: 1.1rem; margin-bottom: 1rem;">Cluster Impact Simulation</h2>
            <div id="sim-server-info" style="margin-bottom: 1rem;"></div>
            <div class="sim-grid" id="sim-grid"></div>
            <div id="sim-breakdown" style="margin-top: 1rem;"></div>
            <div id="sim-order-section" style="margin-top: 1.5rem;"></div>
        </div>
    </div>

    <!-- Auth Token Modal -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal" style="max-width: 420px;">
            <button class="modal-close" onclick="closeAuthModal()">&times;</button>
            <h2 style="font-size: 1.1rem; margin-bottom: 0.5rem;">Authenticate</h2>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">Enter the Deal Sniper auth token to enable order placement.</p>
            <input type="password" id="auth-token-input" placeholder="Bearer token" autocomplete="off"
                   style="width: 100%; padding: 0.6rem 0.75rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 0.5rem; color: var(--text-primary); font-size: 0.9rem; margin-bottom: 1rem;">
            <div style="display: flex; gap: 0.75rem; justify-content: flex-end;">
                <button onclick="closeAuthModal()" style="padding: 0.5rem 1rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 0.5rem; color: var(--text-secondary); cursor: pointer;">Cancel</button>
                <button onclick="saveAuthToken()" style="padding: 0.5rem 1rem; background: var(--accent); border: none; border-radius: 0.5rem; color: white; font-weight: 600; cursor: pointer;">Save</button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
