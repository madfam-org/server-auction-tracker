name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.8.0

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install gcc for CGO (SQLite)
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Run tests
        run: CGO_ENABLED=1 go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install gcc for CGO (SQLite)
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Build CLI binary
        run: CGO_ENABLED=1 go build -o foundry-scout ./cmd/foundry-scout
      - name: Build web binary
        run: CGO_ENABLED=1 go build -o deal-sniper ./cmd/deal-sniper
      - name: Verify CLI binary
        run: ./foundry-scout --help

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/madfam-org/foundry-scout:latest
            ghcr.io/madfam-org/foundry-scout:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
