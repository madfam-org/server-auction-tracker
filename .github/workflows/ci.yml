name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.8.0

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install gcc for CGO (SQLite)
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Run tests
        run: CGO_ENABLED=1 go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install gcc for CGO (SQLite)
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Build binary
        run: CGO_ENABLED=1 go build -o foundry-scout ./cmd/foundry-scout
      - name: Verify binary
        run: ./foundry-scout --help
